name: Build firmware

on:
  pull_request:
    branches: [master, main]
    paths:
      - ".github/workflows/build-firmware.yml"
      - ".github/ci/targets.yml"
      - "tools/ci/build_feed.sh"
      - "tools/ci/build_image.sh"
      - "tools/ci/build_image_source.sh"
      - "libremesh.mk"
      - "packages/**"
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated devices from .github/ci/targets.yml or 'all'"
        required: false
        default: "all"
      openwrt_release:
        description: "Override OpenWrt release (defaults to targets.yml)"
        required: false
        default: ""

concurrency:
  group: build-firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      targets_matrix: ${{ steps.prepare.outputs.targets_matrix }}
      test_targets_matrix: ${{ steps.prepare.outputs.test_targets_matrix }}
      archs_matrix: ${{ steps.prepare.outputs.archs_matrix }}
      lime_packages_list: ${{ steps.prepare.outputs.lime_packages_list }}
      feed_hash: ${{ steps.prepare.outputs.feed_hash }}
    steps:
      - uses: actions/checkout@v5

      - name: Install yq
        run: sudo apt-get update && sudo apt-get install -y yq jq

      - name: Prepare matrices
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIn '^PKG_MIRROR_HASH:=skip' packages/; then
            echo "PKG_MIRROR_HASH:=skip is deprecated on OpenWrt 24.10; pin PKG_SOURCE_VERSION and set a real sha256." >&2
            exit 1
          fi
          TARGETS_INPUT="${{ github.event.inputs.targets || 'all' }}"
          RELEASE_OVERRIDE="${{ github.event.inputs.openwrt_release || '' }}"

          all_targets_json="$(yq -r '.targets | tojson' .github/ci/targets.yml)"
          default_release="$(yq -r '.openwrt_release' .github/ci/targets.yml)"
          feed_branch="$(yq -r '.feed_branch' .github/ci/targets.yml)"
          packages="$(yq -r '.packages' .github/ci/targets.yml)"
          openwrt_release="${RELEASE_OVERRIDE:-$default_release}"

          if [[ "$TARGETS_INPUT" == "all" ]]; then
            selected_targets="$all_targets_json"
          else
            selected_targets="$(
              jq -c --arg list "$TARGETS_INPUT" '
                ($list | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $wanted
                | map(select((.device as $d | any($wanted[]; . == $d))))
              ' <<< "$all_targets_json"
            )"
          fi

          if [[ "$(jq 'length' <<< "$selected_targets")" -eq 0 ]]; then
            echo "No targets selected after filtering input: $TARGETS_INPUT" >&2
            exit 1
          fi

          # Per-target `packages:` (when present in targets.yml) overrides the
          # global `packages:` default. Used by small-flash devices like
          # librerouter_librerouter-v1 whose 8 MiB SPI NOR can't fit the full
          # LibreMesh package list. `// $pkg` keeps the global default for
          # every target that does NOT define its own list, so this stays
          # backwards-compatible.
          #
          # `build_initramfs` (default false) and the FIT metadata
          # (`fit_arch`, `fit_kernel_loadaddr`, `fit_dts`) are forwarded to
          # build_image.sh as env vars in the `build-image` job so the script
          # knows whether to repack a RAM-bootable initramfs FIT and with
          # which kernel loadaddr / DTB. Targets without these keys fall back
          # to BUILD_INITRAMFS=0 and ship the sysupgrade artifact for IPK
          # validation only (see librerouter_librerouter-v1 below).
          targets_matrix="$(
            jq -c --arg release "$openwrt_release" --arg feed "$feed_branch" --arg pkg "$packages" '
              {include: map(. + {
                openwrt_release: $release,
                feed_branch: $feed,
                packages: (.packages // $pkg),
                build_initramfs: (if (.build_initramfs == true) then "1" else "0" end),
                image_format: (.image_format // "fit"),
                fit_arch: (.fit_arch // ""),
                fit_kernel_loadaddr: (.fit_kernel_loadaddr // ""),
                fit_dts: (.fit_dts // ""),
                fit_config: (.fit_config // "config-1"),
                fit_bootargs: (.fit_bootargs // ""),
                dtb_patch_nvmem_mac: (if (.dtb_patch_nvmem_mac == true) then "1" else "0" end),
                # Subtarget kconfig identifier for image_format=
                # source-initramfs-kernel. Naming kept (`sdk_*`) for
                # backwards compat with targets.yml during the SDK -> full
                # source migration; rename to `target_subtarget` once
                # there are no other consumers. Defaulting to "" keeps
                # every other target (FIT and multi-uimage) untouched;
                # build_image_source.sh validates required != "" itself.
                sdk_target_subtarget: (.sdk_target_subtarget // ""),
                test_firmware: (if (.test_firmware == false) then "0" else "1" end),
                test_places: (.test_places // [.device]),
                uboot_interrupt_spam_sec: (.uboot_interrupt_spam_sec // "" | tostring)
              })}
            ' <<< "$selected_targets"
          )"

          # Subset of targets that actually go through hardware testing,
          # expanded by labgrid place so multiple physical units of the
          # same hardware (e.g. three Belkin RT3200 sharing the
          # linksys_e8450-ubi artifact) each get their own test-firmware
          # job. `test_firmware: false` in targets.yml opts a target out
          # of this expansion entirely (e.g. librerouter_librerouter-v1
          # where ImageBuilder cannot produce a RAM-bootable image —
          # TFTP boot would TIMEOUT).
          #
          # Per matrix entry we keep ALL build-job fields (device,
          # imagebuilder, profile, …) so any step in test-firmware that
          # references matrix.device (artifact download, LG_ENV path)
          # still works; and we add a `place` field used for the labgrid
          # lock and the per-unit TFTP namespace.
          test_targets_matrix="$(
            jq -c '
              {include: (
                .include
                | map(select(.test_firmware == "1"))
                | map(. as $t | $t.test_places | map($t + {place: .}))
                | add
              )}
            ' <<< "$targets_matrix"
          )"

          archs_matrix="$(
            jq -c --arg release "$openwrt_release" '
              {
                include: (
                  [.[] | {arch, sdk_arch, index_imagebuilder}]
                  | unique_by(.arch)
                  | map(. + {openwrt_release: $release})
                )
              }
            ' <<< "$selected_targets"
          )"

          # Explicit list of every package directory under packages/ that
          # actually has a Makefile (the repo has placeholder dirs like
          # `cotonete/`, `lime-curtigghio/`, `test-packet-franco/` with only a
          # README that would crash `make package/$name/download`).
          # We pass this as PACKAGES to openwrt/gh-action-sdk because empty
          # PACKAGES only builds what `make defconfig` enables (which is
          # nothing for this repo: lime-* packages have no `default y/m`).
          lime_packages_list="$(
            find packages -mindepth 2 -maxdepth 2 -name Makefile -printf '%h\n' \
              | xargs -n1 basename \
              | sort -u \
              | tr '\n' ' ' | sed 's/[[:space:]]*$//'
          )"
          echo "Computed package list ($(echo "$lime_packages_list" | wc -w) packages):"
          echo "$lime_packages_list" | tr ' ' '\n'

          # Compute a single sha256 over inputs that affect the *compiled* IPKs
          # only: package Makefiles / files / patches / src plus
          # tools/ci/build_feed.sh. We intentionally exclude `.github/ci/targets.yml`
          # and this workflow file — they affect ImageBuilder package selection and
          # CI orchestration, not which `.ipk` files the SDK produces. Including them
          # caused a full ~50 min SDK rebuild on every workflow or per-target
          # `packages:` tweak despite unchanged package sources.
          #
          # OpenWrt release + arch remain in the actions/cache key separately.
          feed_hash="$(
            {
              find packages -type f \( -name 'Makefile' -o -path 'packages/*/files/*' -o -path 'packages/*/patches/*' -o -path 'packages/*/src/*' \) -print0 \
                | LC_ALL=C sort -z \
                | xargs -0 sha256sum
              sha256sum tools/ci/build_feed.sh
            } | sha256sum | cut -d' ' -f1
          )"
          echo "Computed feed_hash=$feed_hash"

          echo "targets_matrix=$targets_matrix" >> "$GITHUB_OUTPUT"
          echo "test_targets_matrix=$test_targets_matrix" >> "$GITHUB_OUTPUT"
          echo "archs_matrix=$archs_matrix" >> "$GITHUB_OUTPUT"
          echo "lime_packages_list=$lime_packages_list" >> "$GITHUB_OUTPUT"
          echo "feed_hash=$feed_hash" >> "$GITHUB_OUTPUT"

  build-feed:
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.archs_matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Free disk
        run: sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android

      # Skip the ~50-min SDK compile when nothing that affects the produced
      # IPKs has changed. `feed_hash` is computed in `prepare-matrix` over
      # package sources (Makefiles, patches/, files/, src/) and
      # `tools/ci/build_feed.sh` only — not targets.yml / this workflow, so
      # image-only or CI-only edits reuse the feed. `restore-keys` allows a
      # partial match on the same arch+release when the exact hash is new
      # (first push after a package change still gets a warm-ish cache).
      # We avoid the `hashFiles(...)` workflow expression because the runner-side
      # glob has been flaky for `packages/**` patterns.
      - name: Restore feed cache
        id: cache-feed
        uses: actions/cache@v4
        with:
          path: feed-artifact/lime_packages
          key: lime-feed-v2-${{ matrix.arch }}-${{ matrix.openwrt_release }}-${{ needs.prepare-matrix.outputs.feed_hash }}
          restore-keys: |
            lime-feed-v2-${{ matrix.arch }}-${{ matrix.openwrt_release }}-

      - name: Build packages with openwrt/gh-action-sdk
        if: steps.cache-feed.outputs.cache-hit != 'true'
        uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: ${{ matrix.sdk_arch }}
          FEEDNAME: lime_packages
          # Explicit package list (computed in prepare-matrix from `packages/`).
          # Empty PACKAGES only builds what `make defconfig` enables and lime-*
          # packages have no `default y/m`, so nothing would be produced. With
          # an explicit list, gh-action-sdk does
          # `feeds install -p lime_packages -f $PKG && make package/$PKG/compile`
          # for each entry, guaranteeing every IPK lands in
          # bin/packages/<arch>/lime_packages/.
          PACKAGES: ${{ needs.prepare-matrix.outputs.lime_packages_list }}
          # No `patches/` dir in any package -> refresh check is a no-op anyway,
          # but we still skip it to keep logs short and avoid spurious diffs.
          NO_REFRESH_CHECK: "1"
          # Disable shfmt formatting check: lime-* ships init scripts whose
          # current formatting predates the action's shfmt rules.
          NO_SHFMT_CHECK: "1"
          # Keep default feeds enabled: lime-* DEPENDS on firewall4, lua,
          # luci-*, jq, … which only resolve through the upstream OpenWrt feeds.
          # SDK-side `make package/index` is brittle in CI (fails after a
          # successful compile with no useful stderr unless V=sc). We generate
          # Packages/Packages.gz ourselves using ImageBuilder's ipkg-make-index.
          INDEX: "0"
          IGNORE_ERRORS: "n m y"

      - name: Diagnose feed build output
        if: steps.cache-feed.outputs.cache-hit != 'true'
        # `set -e` plus a missing `bin/packages/all/lime_packages/` (which is
        # the normal case here: the SDK puts every PKGARCH:=all IPK into the
        # arch dir, not into `all/`) used to abort the whole job at `find ... |
        # wc -l` due to pipefail. Use `shopt -s nullglob` + array length so
        # missing directories simply yield count 0 without aborting.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          echo "=== bin/packages tree ==="
          find bin/packages -maxdepth 4 -type d 2>/dev/null | sort || true
          echo "=== bin/packages/${{ matrix.arch }}/lime_packages/ ==="
          ls -la "bin/packages/${{ matrix.arch }}/lime_packages/" 2>/dev/null || echo "(missing)"
          echo "=== bin/packages/all/lime_packages/ ==="
          ls -la "bin/packages/all/lime_packages/" 2>/dev/null || echo "(missing)"
          arch_files=("bin/packages/${{ matrix.arch }}/lime_packages/"*.ipk)
          all_files=("bin/packages/all/lime_packages/"*.ipk)
          echo "Arch IPKs: ${#arch_files[@]} | All IPKs: ${#all_files[@]}"
          if (( ${#arch_files[@]} == 0 && ${#all_files[@]} == 0 )); then
            echo "ERROR: feed produced no IPKs" >&2
            exit 1
          fi

      - name: Assemble lime_packages feed artifact (index with ImageBuilder)
        if: steps.cache-feed.outputs.cache-hit != 'true'
        env:
          OPENWRT_RELEASE: ${{ matrix.openwrt_release }}
        run: |
          set -euo pipefail
          rm -rf feed-artifact
          mkdir -p feed-artifact/lime_packages

          arch_dir="bin/packages/${{ matrix.arch }}/lime_packages"
          all_dir="bin/packages/all/lime_packages"

          if [[ -d "$arch_dir" ]]; then
            cp -a "$arch_dir"/. feed-artifact/lime_packages/
          fi
          if [[ -d "$all_dir" ]]; then
            cp -a "$all_dir"/. feed-artifact/lime_packages/
          fi

          shopt -s nullglob
          ipk_count=(feed-artifact/lime_packages/*.ipk)
          if [[ ${#ipk_count[@]} -eq 0 ]]; then
            echo "ERROR: No .ipk files found under feed-artifact/lime_packages" >&2
            echo "Expected sources: $arch_dir and/or $all_dir" >&2
            exit 1
          fi

          docker pull "ghcr.io/openwrt/imagebuilder:${{ matrix.index_imagebuilder }}-v${OPENWRT_RELEASE}"
          chmod -R a+rwX feed-artifact/lime_packages
          # CRITICAL: must `cd /work` and pass `.` (not `/work`) to
          # ipkg-make-index.sh — the script puts whatever path it receives
          # straight into the `Filename:` field, after only stripping a leading
          # `./`. Passing `/work` produces `Filename: /work/lime-system_*.ipk`,
          # which opkg later resolves as `file:///feed/lime_packages//work/...`
          # (404), so every package in our local feed fails to install with
          # `* opkg_install_cmd: Cannot install package lime-system.` etc.
          docker run --rm \
            --user root \
            -e MKHASH=/builder/staging_dir/host/bin/mkhash \
            -e PATH=/builder/staging_dir/host/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -v "$(pwd)/feed-artifact/lime_packages:/work" \
            "ghcr.io/openwrt/imagebuilder:${{ matrix.index_imagebuilder }}-v${OPENWRT_RELEASE}" \
            sh -lc 'cd /work && /builder/scripts/ipkg-make-index.sh . > Packages && gzip -9nc Packages > Packages.gz'

          echo "=== Final feed-artifact/lime_packages/ contents ==="
          ls -la feed-artifact/lime_packages/
          echo "=== Packages index summary (first 60 lines + count) ==="
          head -n 60 feed-artifact/lime_packages/Packages || true
          pkg_count=$(grep -c '^Package:' feed-artifact/lime_packages/Packages || echo 0)
          echo "Total Package: entries in index: ${pkg_count}"
          echo "=== Sanity: Filename fields must be bare basenames ==="
          bad_fn=$(grep -E '^Filename: (/|\./)' feed-artifact/lime_packages/Packages || true)
          if [[ -n "$bad_fn" ]]; then
            echo "ERROR: Packages index has non-basename Filename entries:" >&2
            echo "$bad_fn" >&2
            exit 1
          fi
          grep -m 3 '^Filename:' feed-artifact/lime_packages/Packages

      - name: Diagnose cached feed (cache hit)
        if: steps.cache-feed.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          echo "=== Cache hit: feed-artifact/lime_packages/ ==="
          ls -la feed-artifact/lime_packages/
          pkg_count=$(grep -c '^Package:' feed-artifact/lime_packages/Packages || echo 0)
          echo "Cached index has ${pkg_count} packages"

      - name: Upload local feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: lime-feed-${{ matrix.arch }}
          path: feed-artifact/lime_packages/
          retention-days: 7

      - name: Upload feed debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-feed-${{ matrix.arch }}
          path: |
            bin/packages/${{ matrix.arch }}/
            logs/
          if-no-files-found: ignore
          retention-days: 7

  build-image:
    runs-on: ubuntu-latest
    needs: [prepare-matrix, build-feed]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.targets_matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Free disk
        run: sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /usr/local/lib/android

      # The IB-based build_image.sh consumes pre-built IPKs from the
      # build-feed artifact. The source-based build_image_source.sh
      # consumes the LibreMesh package SOURCE tree (Makefiles + files/)
      # instead, because the OpenWrt source tree compiles them itself as
      # part of the kernel + rootfs assembly. We download the IPK feed
      # only on the IB path to avoid wasting bandwidth + disk on source
      # builds that ignore it.
      - name: Download matching local feed (ImageBuilder path only)
        if: matrix.image_format != 'source-initramfs-kernel'
        uses: actions/download-artifact@v5
        with:
          name: lime-feed-${{ matrix.arch }}
          path: ./feed-in/lime_packages/

      - name: Diagnose downloaded feed (ImageBuilder path only)
        if: matrix.image_format != 'source-initramfs-kernel'
        run: |
          set -euo pipefail
          echo "=== feed-in/lime_packages/ contents ==="
          ls -la ./feed-in/lime_packages/
          echo "=== Packages index head ==="
          head -n 80 ./feed-in/lime_packages/Packages || echo "(no Packages file)"
          ipk_count=$(find ./feed-in/lime_packages -maxdepth 1 -name '*.ipk' | wc -l)
          pkg_idx_count=$(grep -c '^Package:' ./feed-in/lime_packages/Packages 2>/dev/null || echo 0)
          echo "IPK files: ${ipk_count} | Packages index entries: ${pkg_idx_count}"

      # Source builds need both `packages/<pkg>/Makefile` AND `libremesh.mk`
      # accessible inside the container. The pi-lime-packages checkout
      # already has both at its workspace root, so build_image_source.sh
      # takes the workspace root as its `feed_dir` arg and bind-mounts
      # the whole tree at /lime_pkg. No staging step needed: previous
      # iterations symlinked packages/ → feed-src/lime_packages, but
      # that broke the relative `include ../../libremesh.mk` lookup
      # used by lime-proto-*, lime-hwd-*, etc. (the helper Makefile
      # was outside the symlinked tree). See build_image_source.sh for
      # the long version.

      - name: Pull ImageBuilder image
        if: matrix.image_format != 'source-initramfs-kernel'
        run: docker pull ghcr.io/openwrt/imagebuilder:${{ matrix.imagebuilder }}-v${{ matrix.openwrt_release }}

      - name: Pull build-env image (source path only)
        if: matrix.image_format == 'source-initramfs-kernel'
        # We re-use ghcr.io/openwrt/sdk:* purely for its preinstalled
        # OpenWrt build deps (gcc, perl, ncurses, swig, python3-setuptools,
        # …) — see the long comment at the top of build_image_source.sh.
        # The image is already pulled by build_image.sh on every other
        # matrix entry, so the Docker layer cache amortises the ~2 GB pull.
        run: docker pull ghcr.io/openwrt/sdk:${{ matrix.imagebuilder }}-v${{ matrix.openwrt_release }}

      # Persistent OpenWrt source-build cache. The full source build
      # pulls down the OpenWrt source tree (~250 MB shallow clone),
      # builds the cross toolchain (~1 GB host tools + ~2 GB target
      # toolchain), and downloads ~120 package source tarballs (~500 MB).
      # We cache all of that so that the second and subsequent runs
      # only have to recompile the kernel + lime-* packages (~10–20 min).
      #
      # We DO NOT cache `build_dir/target-*` or `bin/` (the per-target
      # package build outputs and the final image artefacts). Reasons:
      #   * `build_dir/target-*/root-*` is the rootfs assembly area;
      #     caching it would carry stale lime-* installs into the next
      #     run and the LibreMesh content would not refresh.
      #   * `bin/` is the output dir; caching it would resurrect
      #     last-run artefacts and confuse the artefact picker below.
      #   * Both can grow >3 GB combined, eating GHA`s 10 GB/repo cache
      #     allowance fast.
      #
      # Cache key includes the imagebuilder tag, OpenWrt release, and
      # the lime packages feed hash. A LibreMesh package source change
      # bumps `feed_hash` → cache miss → fresh package compile (good).
      # An OpenWrt release bump bumps `openwrt_release` → cache miss →
      # full toolchain rebuild (necessary; ABI changes). restore-keys
      # gives a partial hit on the same imagebuilder + release for
      # warm-ish builds across feed-only changes.
      #
      # The script (build_image_source.sh) checks the cached clone`s
      # tag and re-clones if it doesn`t match `v${openwrt_release}`,
      # so a stale-key restore (rare, only happens when actions/cache
      # silently restores from a different release tag because of an
      # eviction) self-heals at the cost of one cold build.
      - name: Restore OpenWrt source-build cache (source path only)
        if: matrix.image_format == 'source-initramfs-kernel'
        id: source-cache
        uses: actions/cache@v4
        with:
          # actions/cache@v4 supports `!` exclusion patterns. We cache
          # the entire openwrt-cache/ tree minus build_dir/target-* and
          # bin/. Order matters: includes first, then exclusions.
          path: |
            openwrt-cache
            !openwrt-cache/build_dir/target-*
            !openwrt-cache/bin
            !openwrt-cache/tmp
          key: openwrt-source-v1-${{ matrix.imagebuilder }}-${{ matrix.openwrt_release }}-${{ needs.prepare-matrix.outputs.feed_hash }}
          restore-keys: |
            openwrt-source-v1-${{ matrix.imagebuilder }}-${{ matrix.openwrt_release }}-

      - name: Build firmware image (ImageBuilder path)
        if: matrix.image_format != 'source-initramfs-kernel'
        env:
          DEVICE_NAME: ${{ matrix.device }}
          ARCH: ${{ matrix.arch }}
          FEED_BRANCH: ${{ matrix.feed_branch }}
          PACKAGES: ${{ matrix.packages }}
          # FIT-repack metadata. `BUILD_INITRAMFS=1` triggers the
          # `mkimage` repack step in build_image.sh that builds a real
          # RAM-bootable initramfs FIT containing the LibreMesh rootfs.
          # The other three fields are consumed by mkits.sh inside the
          # script. Targets without these set (build_initramfs=0) just
          # ship the sysupgrade artifact for IPK validation.
          BUILD_INITRAMFS: ${{ matrix.build_initramfs }}
          # IMAGE_FORMAT selects the repack output format inside
          # build_image.sh: `fit` for mediatek/filogic FIT-aware U-Boots,
          # `multi-uimage` for legacy ath79 boards (kept for reference;
          # no targets currently use it). The empty default falls
          # through to build_image.sh's own `fit` default so older
          # targets in targets.yml that do not set `image_format:` keep
          # producing the same `.itb` they always did.
          IMAGE_FORMAT: ${{ matrix.image_format }}
          FIT_ARCH: ${{ matrix.fit_arch }}
          FIT_KERNEL_LOADADDR: ${{ matrix.fit_kernel_loadaddr }}
          FIT_DTS: ${{ matrix.fit_dts }}
          FIT_CONFIG: ${{ matrix.fit_config }}
          # Empty FIT_BOOTARGS falls through to build_image.sh's own
          # default ("console=ttyS0,115200n1 pci=pcie_bus_perf"), keeping
          # legacy openwrt_one / bananapi_bpi-r4 builds unchanged. Set
          # per-target via `fit_bootargs:` in targets.yml when a board
          # needs extra args (e.g. linksys_e8450 wants `swiotlb=512`).
          FIT_BOOTARGS: ${{ matrix.fit_bootargs }}
          # "1" enables the patch_dtb_local_mac.py round-trip on the
          # FIT-shipped DTB (workaround for openwrt#22858). Defaults to
          # "0" via the matrix expansion in prepare-matrix; only set to
          # "1" for boards whose factory NVMEM lives in a UBI volume.
          DTB_PATCH_NVMEM_MAC: ${{ matrix.dtb_patch_nvmem_mac }}
        run: |
          chmod +x tools/ci/build_image.sh
          tools/ci/build_image.sh \
            "${{ matrix.imagebuilder }}" \
            "${{ matrix.profile }}" \
            "${{ matrix.openwrt_release }}" \
            "./feed-in" \
            "./out"

      - name: Build firmware image (full source path)
        if: matrix.image_format == 'source-initramfs-kernel'
        env:
          DEVICE_NAME: ${{ matrix.device }}
          PACKAGES: ${{ matrix.packages }}
          # OpenWrt kconfig identifier (target/subtarget, e.g.
          # `ath79/generic`) passed through from targets.yml.
          # build_image_source.sh refuses to run without it.
          PROFILE_TARGET: ${{ matrix.sdk_target_subtarget }}
          # Persistent OpenWrt source/build cache restored above. The
          # script accepts an empty / non-existent dir on a cold cache
          # and rebuilds from scratch. Env name matches the script
          # contract; the matching actions/cache step caches the same
          # `openwrt-cache` workspace path.
          OPENWRT_SRC_CACHE_DIR: ${{ github.workspace }}/openwrt-cache
        run: |
          chmod +x tools/ci/build_image_source.sh
          # feed_dir = workspace root (contains packages/ + libremesh.mk).
          # See "Source builds need both …" comment above for why we no
          # longer stage a feed-src/ symlink intermediary.
          tools/ci/build_image_source.sh \
            "${{ matrix.imagebuilder }}" \
            "${{ matrix.profile }}" \
            "${{ matrix.openwrt_release }}" \
            "${{ github.workspace }}" \
            "./out"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device }}
          path: ./out/firmware-${{ matrix.device }}.*
          retention-days: 7

      - name: Upload image debug files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-image-${{ matrix.device }}
          path: |
            ./out/
            ./feed-in/
          if-no-files-found: ignore
          retention-days: 7

  # Self-hosted hardware tests: do not run for fork PRs (no lab access / abuse).
  # Uses `test_targets_matrix` (filtered subset of `targets_matrix`) so that
  # targets explicitly marked `test_firmware: false` in targets.yml never
  # schedule a hardware-test job. (Historical note: `librerouter_librerouter-v1`
  # was excluded for a long while because its ath79 / U-Boot 1.1.x stack has
  # no FIT parser and an ImageBuilder squashfs-sysupgrade is not
  # RAM-bootable. The `image_format: multi-uimage` repack path now produces
  # a legacy IH_TYPE_MULTI uImage that LibreRouter's U-Boot can load over
  # TFTP, so the target is opted back in.)
  test-firmware:
    # Display the place (e.g. `belkin_rt3200_1`) instead of the device
    # so the GitHub UI distinguishes the three Belkin RT3200 jobs that
    # share the linksys_e8450-ubi artifact. For single-place targets
    # (openwrt_one, bananapi_bpi-r4) place == device so the displayed
    # name is unchanged.
    name: test-firmware (${{ matrix.place }})
    needs: [prepare-matrix, build-image]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, testbed-fcefyn]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.test_targets_matrix) }}
    env:
      PYTHONUNBUFFERED: "1"
      PYTEST_ADDOPTS: "--color=yes"
      LG_CONSOLE: internal
    steps:
      # Fresh workspace on self-hosted runner (artifact download expects ./fw).
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: firmware-${{ matrix.device }}
          path: fw

      - uses: actions/checkout@v6
        with:
          repository: fcefyn-testbed/libremesh-tests
          ref: staging
          path: libremesh-tests

      - uses: actions/checkout@v6
        with:
          repository: aparcar/openwrt-tests
          ref: main
          path: openwrt-tests

      - name: Set OPENWRT_TESTS_DIR for pytest
        run: echo "OPENWRT_TESTS_DIR=$GITHUB_WORKSPACE/openwrt-tests" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync libremesh-tests environment
        run: |
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') uv sync (libremesh-tests) starting"
          cd libremesh-tests && uv sync
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') uv sync finished"

      - name: Stage firmware on TFTP
        run: |
          set -euo pipefail
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') staging firmware for ${{ matrix.device }} on place ${{ matrix.place }}"
          # Per-place TFTP namespace: when several units of the same
          # hardware test the same artifact in parallel (e.g. the three
          # Belkin RT3200 + linksys_e8450-ubi build), routing each job to
          # `<run_id>/<place>/` keeps the cleanup of one job from
          # deleting files another job is still serving over TFTP.
          BASE="/srv/tftp/firmwares/ci"
          STAGE="$BASE/${{ github.run_id }}/${{ matrix.place }}"
          if ! mkdir -p "$STAGE" 2>/tmp/mkdir.err; then
            echo "::error::Cannot create $STAGE: $(cat /tmp/mkdir.err)"
            echo "Fix on the lab host (one-time):"
            echo "  sudo install -d -o \$RUNNER_USER -g \$RUNNER_USER -m 0775 $BASE"
            ls -ld /srv/tftp /srv/tftp/firmwares "$BASE" 2>/dev/null || true
            exit 1
          fi
          shopt -s nullglob
          files=(fw/firmware-${{ matrix.device }}.*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No firmware-${{ matrix.device }}.* under fw/"
            ls -la fw/ || true
            exit 1
          fi
          # Rename the bootable artifact and its sidecars from
          # firmware-<device>.<ext> to firmware-<place>.<ext>. Reason:
          # labgrid's TFTPProviderDriver.stage() creates a symlink in the
          # exporter's TFTP root using only basename(path). Three parallel
          # Belkin jobs would otherwise race on the same
          # `firmware-linksys_e8450.itb` symlink. With a per-place
          # basename, each job gets its own entry under the TFTP root and
          # there is no cross-job interference.
          src_prefix="firmware-${{ matrix.device }}"
          dst_prefix="firmware-${{ matrix.place }}"
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            if [[ "$base" != "$src_prefix"* ]]; then
              echo "::warning::Unexpected artifact name $base (does not start with $src_prefix); copying as-is"
              cp -a "$f" "$STAGE/"
              continue
            fi
            suffix="${base#$src_prefix}"
            cp -a "$f" "$STAGE/${dst_prefix}${suffix}"
          done
          # Pick the actual bootable image, NOT the manifest sidecar that
          # tools/ci/build_image.sh now ships next to the firmware. Manifest
          # files have the .manifest extension and are text describing the
          # installed packages — they would be useless to TFTP-boot.
          image_candidates=("$STAGE"/firmware-${{ matrix.place }}.*)
          LG_IMAGE=""
          for f in "${image_candidates[@]}"; do
            case "$f" in
              *.manifest|*.sha256|*.txt|*.log) ;;
              *) LG_IMAGE="$f"; break ;;
            esac
          done
          if [[ -z "$LG_IMAGE" ]]; then
            echo "::error::No bootable firmware artifact under $STAGE (only sidecars?)"
            ls -la "$STAGE" || true
            exit 1
          fi
          echo "LG_IMAGE=$LG_IMAGE" >> "$GITHUB_ENV"
          echo "Staged LG_IMAGE=$LG_IMAGE"
          echo "=== firmware sanity ==="
          file "$LG_IMAGE" || true
          ls -la "$LG_IMAGE"
          sha256sum "$LG_IMAGE"
          # Echo the manifest sidecar contents so a quick glance at the CI
          # log answers "is this a LibreMesh image?" without re-running the
          # build job. We grep the lime/shared-state/batctl entries because
          # the full manifest can be 200+ lines of generic OpenWrt deps.
          MANIFEST="$STAGE/firmware-${{ matrix.place }}.manifest"
          if [[ -f "$MANIFEST" ]]; then
            echo "=== manifest sidecar ($(wc -l < "$MANIFEST") packages): LibreMesh entries ==="
            grep -E '^(lime-|shared-state-|batctl|babeld|firewall4)' "$MANIFEST" || \
              echo "(no lime-/shared-state-/batctl/babeld entries — image is NOT LibreMesh)"
          else
            echo "::warning::No manifest sidecar at $MANIFEST — older build_image.sh? Cannot pre-validate LibreMesh content."
          fi

      - name: Lock labgrid place
        working-directory: libremesh-tests
        run: |
          set -euo pipefail
          echo "LG_PROXY=labgrid-fcefyn" >> "$GITHUB_ENV"
          # Direct lock by place — every test_firmware matrix entry now
          # carries an explicit `place` field (defaulted to the device
          # name in prepare-matrix for single-unit targets), so we no
          # longer need `labgrid-client reserve --shell device=…` to
          # discover a place. This makes the lock deterministic across
          # devices that share a hardware profile (Belkin RT3200 #1/#2/#3
          # all run the linksys_e8450-ubi build), and keeps the legacy
          # behaviour for openwrt_one / bananapi_bpi-r4 where place
          # equals device.
          PLACE="labgrid-fcefyn-${{ matrix.place }}"
          LOCK_OUT=$(uv run labgrid-client -v -p "$PLACE" lock 2>&1) || {
            echo "$LOCK_OUT"
            echo "::error::labgrid lock failed for $PLACE"
            exit 1
          }
          echo "$LOCK_OUT"
          echo "LG_PLACE=$PLACE" >> "$GITHUB_ENV"
          echo "LG_ENV=targets/${{ matrix.device }}.yaml" >> "$GITHUB_ENV"
          echo "Locked $PLACE for device=${{ matrix.device }}"

      - name: Run single-node LibreMesh tests
        working-directory: libremesh-tests
        env:
          LG_PROXY: labgrid-fcefyn
          LG_IMAGE: ${{ env.LG_IMAGE }}
          LG_PLACE: ${{ env.LG_PLACE }}
          LG_ENV: ${{ env.LG_ENV }}
          # Per-target override of the U-Boot interrupt spam window
          # honoured by tftpstrategy._spam_uboot_interrupt(). Empty
          # string falls through to the strategy default (12s) thanks
          # to _read_float_env() returning the default on empty input.
          # Bumped to 25s for linksys_e8450 (Belkin RT3200) where
          # BL2/BL31 take ~12s and the autoboot countdown follows
          # immediately afterwards — see targets.yml comment block.
          LG_MESH_UBOOT_INTERRUPT_SPAM_SEC: ${{ matrix.uboot_interrupt_spam_sec }}
        run: |
          set -euo pipefail
          # Per-place log dir: when three Belkin RT3200 jobs run in
          # parallel against the linksys_e8450 build artifact each one
          # uploads its own `test-results-<place>` artifact below;
          # collapsing them into a single per-device dir would race on
          # the report.xml file.
          mkdir -p "$GITHUB_WORKSPACE/logs/${{ matrix.place }}"
          uv run pytest tests/test_libremesh.py \
            --lg-log "$GITHUB_WORKSPACE/logs/${{ matrix.place }}/" \
            --junitxml="$GITHUB_WORKSPACE/logs/${{ matrix.place }}/report.xml" \
            --lg-colored-steps \
            --log-cli-level=CONSOLE

      - name: Poweroff and unlock device
        if: always()
        working-directory: libremesh-tests
        env:
          LG_PLACE: ${{ env.LG_PLACE }}
        run: |
          set +e
          # We only ever acquire `labgrid-fcefyn-<place>` directly (no
          # more `labgrid-client reserve --shell` flow), so a missing
          # LG_PLACE means the lock step never ran (e.g. TFTP staging
          # failed first); nothing to release in that case. Otherwise
          # release exactly the place we locked — calling power off /
          # unlock without -p would fall back to labgrid's empty default
          # and match every registered place ("pattern matches multiple
          # places…").
          if [ -n "${LG_PLACE:-}" ]; then
            uv run labgrid-client -p "$LG_PLACE" power off || true
            uv run labgrid-client -p "$LG_PLACE" unlock || true
          else
            echo "No labgrid lock acquired by this job; skipping power off / unlock."
          fi
          # Per-place TFTP namespace mirrors the staging step so each
          # parallel Belkin job cleans only its own staging directory.
          rm -rf "/srv/tftp/firmwares/ci/${{ github.run_id }}/${{ matrix.place }}" 2>/dev/null || true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact name follows the place so the three Belkin jobs do
          # not collide on `test-results-linksys_e8450`. Single-place
          # targets keep their previous name (place == device).
          name: test-results-${{ matrix.place }}
          path: ${{ github.workspace }}/logs/${{ matrix.place }}/*
          if-no-files-found: ignore
          retention-days: 14

  test-mesh:
    name: test-mesh (openwrt_one + bananapi_bpi-r4)
    needs: test-firmware
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, testbed-fcefyn]
    env:
      PYTHONUNBUFFERED: "1"
      PYTEST_ADDOPTS: "--color=yes"
      LG_CONSOLE: internal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: fcefyn-testbed/libremesh-tests
          ref: staging
          path: libremesh-tests

      - uses: actions/checkout@v6
        with:
          repository: aparcar/openwrt-tests
          ref: main
          path: openwrt-tests

      - name: Set OPENWRT_TESTS_DIR for pytest
        run: echo "OPENWRT_TESTS_DIR=$GITHUB_WORKSPACE/openwrt-tests" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync libremesh-tests environment
        run: cd libremesh-tests && uv sync

      - name: Download firmware (openwrt_one)
        uses: actions/download-artifact@v4
        with:
          name: firmware-openwrt_one
          path: fw-openwrt_one

      - name: Download firmware (bananapi_bpi-r4)
        uses: actions/download-artifact@v4
        with:
          name: firmware-bananapi_bpi-r4
          path: fw-bananapi_bpi-r4

      - name: Stage firmware and run mesh tests
        run: |
          set -euo pipefail
          BASE="/srv/tftp/firmwares/ci/${{ github.run_id }}/mesh"
          if ! mkdir -p "$BASE/openwrt_one" "$BASE/bananapi_bpi-r4" 2>/tmp/mkdir.err; then
            echo "::error::Cannot create $BASE: $(cat /tmp/mkdir.err)"
            echo "Fix on the lab host (one-time):"
            echo "  sudo install -d -o \$RUNNER_USER -g \$RUNNER_USER -m 0775 /srv/tftp/firmwares/ci"
            ls -ld /srv/tftp /srv/tftp/firmwares /srv/tftp/firmwares/ci 2>/dev/null || true
            exit 1
          fi
          cp "$GITHUB_WORKSPACE/fw-openwrt_one"/firmware-openwrt_one.* "$BASE/openwrt_one/"
          cp "$GITHUB_WORKSPACE/fw-bananapi_bpi-r4"/firmware-bananapi_bpi-r4.* "$BASE/bananapi_bpi-r4/"
          # Skip non-bootable sidecars (.manifest, .sha256, etc) when picking
          # the LG image. tools/ci/build_image.sh now ships a manifest next
          # to each firmware artifact for downstream LibreMesh verification.
          pick_image() {
            local dir="$1" device="$2" picked=""
            for f in "$dir"/firmware-"$device".*; do
              case "$f" in
                *.manifest|*.sha256|*.txt|*.log) ;;
                *) picked="$f"; break ;;
              esac
            done
            if [[ -z "$picked" ]]; then
              echo "::error::No bootable firmware under $dir (only sidecars?)" >&2
              ls -la "$dir" >&2 || true
              return 1
            fi
            echo "$picked"
          }
          IMG1=$(pick_image "$BASE/openwrt_one" "openwrt_one")
          IMG2=$(pick_image "$BASE/bananapi_bpi-r4" "bananapi_bpi-r4")
          echo "=== mesh firmware sanity ==="
          for img in "$IMG1" "$IMG2"; do
            file "$img" || true
            ls -la "$img"
            sha256sum "$img"
            manifest="${img%.*}.manifest"
            if [[ -f "$manifest" ]]; then
              echo "=== manifest for $(basename "$img"): LibreMesh entries ==="
              grep -E '^(lime-|shared-state-|batctl|babeld|firewall4)' "$manifest" || \
                echo "(no LibreMesh entries — image is NOT LibreMesh)"
            else
              echo "::warning::No manifest sidecar at $manifest"
            fi
          done
          export LG_PROXY=labgrid-fcefyn
          export LG_MESH_PLACES="labgrid-fcefyn-openwrt_one,labgrid-fcefyn-bananapi_bpi-r4"
          export LG_IMAGE_MAP="labgrid-fcefyn-openwrt_one=$IMG1,labgrid-fcefyn-bananapi_bpi-r4=$IMG2"
          mkdir -p "$GITHUB_WORKSPACE/mesh-logs"
          echo "LG_IMAGE_MAP=$LG_IMAGE_MAP"
          cd libremesh-tests
          uv run pytest tests/test_mesh.py \
            --lg-log "$GITHUB_WORKSPACE/mesh-logs/" \
            --junitxml="$GITHUB_WORKSPACE/mesh-logs/report.xml" \
            --log-cli-level=INFO -v
          rm -rf "/srv/tftp/firmwares/ci/${{ github.run_id }}/mesh"

      - name: Cleanup TFTP on failure
        if: failure()
        run: rm -rf "/srv/tftp/firmwares/ci/${{ github.run_id }}/mesh" || true

      - name: Upload mesh test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-mesh
          path: mesh-logs/*
          if-no-files-found: ignore
          retention-days: 14

  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [prepare-matrix, build-feed, build-image, test-firmware, test-mesh]
    steps:
      - name: Build summary
        run: |
          {
            echo "## Firmware build summary"
            echo
            echo "- Targets matrix: \`${{ needs.prepare-matrix.outputs.targets_matrix }}\`"
            echo "- Arch matrix: \`${{ needs.prepare-matrix.outputs.archs_matrix }}\`"
            echo "- Feed stage result: \`${{ needs.build-feed.result }}\`"
            echo "- Image stage result: \`${{ needs.build-image.result }}\`"
            echo "- test-firmware result: \`${{ needs.test-firmware.result }}\`"
            echo "- test-mesh result: \`${{ needs.test-mesh.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
